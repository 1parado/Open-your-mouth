name: ai_oral_teacher
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  
  # State Management
  flutter_bloc: ^8.1.5
  
  # HTTP Client
  dio: ^5.6.0
  
  # Dependency Injection
  get_it: ^7.7.0
  injectable: ^2.4.2
  
  # Value Equality
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0
  
  # Local Storage
  shared_preferences: ^2.2.3
  
  # Audio
  audioplayers: ^5.2.1
  record: ^5.1.2
  
  # WebSocket
  web_socket_channel: ^2.4.5
  
  # Utility
  equatable: ^2.0.7
  go_router: ^14.1.2

  # Environment
  flutter_dotenv: ^5.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.2
  build_runner: ^2.4.11
  freezed: ^2.5.2
  json_serializable: ^6.8.0
  injectable_generator: ^2.6.1

flutter:
  uses-material-design: true
  assets:
    - .env
